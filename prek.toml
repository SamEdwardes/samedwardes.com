[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-added-large-files" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "check", name = "check", language = "system", entry = "bun run check" },
  { id = "format", name = "format", language = "system", entry = "bun run format" },
]
